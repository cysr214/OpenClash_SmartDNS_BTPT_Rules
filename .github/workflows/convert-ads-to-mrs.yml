name: Convert ads rules to MRS format

on:
  schedule:
    # 每周一 UTC 时间 01:00 自动运行（北京时间 09:00）
    - cron: '0 1 * * 1'
  workflow_dispatch:  # 支持手动触发
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
        default: ''

jobs:
  convert:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ inputs.branch != '' && inputs.branch || github.ref_name }}
    steps:
      # 1️⃣ 检出仓库
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      # 2️⃣ 缓存 mihomo 二进制文件
      - name: Cache mihomo binary
        id: cache-mihomo
        uses: actions/cache@v4
        with:
          path: |
            mihomo
            mihomo-version.txt
          key: mihomo-${{ runner.os }}-${{ hashFiles('mihomo-version.txt') }}
          restore-keys: |
            mihomo-${{ runner.os }}-

      # 3️⃣ 下载并安装 mihomo（仅在缓存未命中时）
      - name: Download and setup mihomo
        if: steps.cache-mihomo.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 Fetching latest mihomo release..."
          
          # 使用 jq 解析 JSON
          LATEST_VERSION=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | \
            jq -r '.tag_name // empty')
          
          if [ -z "$LATEST_VERSION" ]; then
            echo "⚠️ Failed to fetch latest version, using fallback version"
            LATEST_VERSION="v1.18.10"
          fi
          
          echo "$LATEST_VERSION" > mihomo-version.txt
          echo "✅ Latest version: $LATEST_VERSION"
          
          echo "⬇️ Downloading mihomo for Linux amd64..."
          wget -q https://github.com/MetaCubeX/mihomo/releases/download/${LATEST_VERSION}/mihomo-linux-amd64-${LATEST_VERSION}.gz
          
          if [ $? -ne 0 ]; then
            echo "❌ Download failed"
            exit 1
          fi
          
          echo "📦 Extracting..."
          gunzip mihomo-linux-amd64-${LATEST_VERSION}.gz
          mv mihomo-linux-amd64-${LATEST_VERSION} mihomo
          chmod +x mihomo
          
          echo "✅ mihomo is ready ($(./mihomo -v 2>&1 | head -n1 || echo 'version check skipped'))"

      - name: Verify mihomo installation
        run: |
          if [ -f "mihomo" ]; then
            chmod +x mihomo
            echo "✅ Using mihomo: $(./mihomo -v 2>&1 | head -n1 || echo 'version unknown')"
            if [ -f "mihomo-version.txt" ]; then
              echo "📌 Version: $(cat mihomo-version.txt)"
            fi
          else
            echo "❌ mihomo binary not found"
            exit 1
          fi

      # 4️⃣ 下载广告拦截规则（并行下载 + 重试机制）
      - name: Download ads rules
        run: |
          echo "📥 Downloading ads blocking rules in parallel..."
          
          mkdir -p ads_rules_temp
          
          # 定义下载函数（带重试）
          download_with_retry() {
            local url="$1"
            local output="$2"
            local name="$3"
            local max_attempts=3
            local attempt=1
            
            while [ $attempt -le $max_attempts ]; do
              echo "  ⬇️ Downloading $name (attempt $attempt/$max_attempts)..."
              if wget -q -O "$output" "$url"; then
                if [ -f "$output" ] && [ -s "$output" ]; then
                  echo "  ✅ $name downloaded successfully"
                  return 0
                fi
              fi
              attempt=$((attempt + 1))
              [ $attempt -le $max_attempts ] && sleep 2
            done
            
            echo "  ⚠️ Failed to download $name after $max_attempts attempts"
            return 1
          }
          
          export -f download_with_retry
          
          # 并行下载（后台进程）
          download_with_retry \
            "https://anti-ad.net/clash.yaml" \
            "ads_rules_temp/anti-ad.yaml" \
            "anti-ad" &
          
          download_with_retry \
            "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml" \
            "ads_rules_temp/AWAvenue-Ads-Rule.yaml" \
            "AWAvenue-Ads-Rule" &
          
          # 等待所有下载完成
          wait
          
          echo ""
          echo "📋 Downloaded files:"
          ls -lh ads_rules_temp/ 2>/dev/null || echo "  No files downloaded"
          
          # 检查是否至少有一个文件下载成功
          file_count=$(find ads_rules_temp -name "*.yaml" -type f 2>/dev/null | wc -l)
          if [ "$file_count" -eq 0 ]; then
            echo "❌ No rules downloaded successfully"
            exit 1
          fi
          
          echo "✅ Successfully downloaded $file_count rule file(s)"

      # 5️⃣ 转换广告规则为 MRS 格式
      - name: Convert ads rules to MRS format
        run: |
          echo "🔄 Converting ads rules to MRS format..."
          
          mkdir -p ads_rules_mrs
          
          # 定义转换函数
          convert_file() {
            local file="$1"
            local filename=$(basename "$file")
            local name="${filename%.*}"
            local output_file="ads_rules_mrs/${name}.mrs"
            
            echo "📄 Converting: $filename"
            
            if ./mihomo convert-ruleset domain yaml "$file" "$output_file" 2>&1; then
              if [ -f "$output_file" ]; then
                size=$(stat -f%z "$output_file" 2>/dev/null || stat -c%s "$output_file")
                echo "   ✅ Success ($(numfmt --to=iec-i --suffix=B $size 2>/dev/null || echo ${size}B))"
                return 0
              else
                echo "   ⚠️ Failed: output file not created"
                return 1
              fi
            else
              echo "   ⚠️ Failed: conversion error"
              return 1
            fi
          }
          
          export -f convert_file
          
          # 并行转换所有文件
          find ads_rules_temp -name "*.yaml" -type f | \
            xargs -P 2 -I {} bash -c 'convert_file "$@"' _ {}
          
          # 统计结果
          total=$(find ads_rules_mrs -name "*.mrs" -type f 2>/dev/null | wc -l)
          expected=$(find ads_rules_temp -name "*.yaml" -type f 2>/dev/null | wc -l)
          failed=$((expected - total))
          
          echo ""
          echo "🎉 Conversion complete!"
          echo "   ✅ Successfully converted: $total files"
          [ $failed -gt 0 ] && echo "   ⚠️ Failed/Skipped: $failed files"
          
          if [ $total -gt 0 ]; then
            echo ""
            echo "📋 Generated MRS files:"
            ls -lh ads_rules_mrs/
            echo ""
            echo "📊 Total size:"
            du -sh ads_rules_mrs
          fi
          
          # 清理临时文件
          rm -rf ads_rules_temp

      # 6️⃣ 提交并推送结果
      - name: Commit and push converted results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ads_rules_mrs
          
          # 检查是否有变化
          if git diff --staged --quiet; then
            echo "📝 No changes detected, skipping commit"
          else
            # 统计信息
            total=$(find ads_rules_mrs -name "*.mrs" -type f 2>/dev/null | wc -l)
            
            git commit -m "chore: update ads rules MRS format" \
                       -m "Converted: $total MRS files" \
                       -m "Updated: $(date +'%Y-%m-%d %H:%M:%S UTC')"
            
            echo "🔄 Pulling latest changes from remote..."
            git pull --rebase origin "${TARGET_BRANCH}" || true
            
            echo "🚀 Pushing changes to ${TARGET_BRANCH}..."
            git push origin HEAD:"${TARGET_BRANCH}" || {
              echo "⚠️ Push failed, retrying with force-with-lease..."
              git push origin HEAD:"${TARGET_BRANCH}" --force-with-lease
            }
            
            echo "✅ Changes pushed successfully!"
          fi
