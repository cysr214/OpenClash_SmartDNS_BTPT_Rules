name: Convert rules to DOMAIN fake_ip_filter

on:
  schedule:
    # 每周一 UTC 时间 02:00 自动运行（北京时间 10:00）
    - cron: '0 2 * * 1'
  workflow_dispatch:
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
        default: ''

jobs:
  convert:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ inputs.branch != '' && inputs.branch || github.ref_name }}
      UPSTREAM_REPO: "Aethersailor/Custom_OpenClash_Rules"
      UPSTREAM_BRANCH: "main"
    steps:
      # 1️⃣ 检出仓库
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      # 2️⃣ 检查上游仓库是否有更新（使用 jq）
      - name: Check upstream updates
        id: check_upstream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Checking upstream repository updates..."
          
          # 使用 jq 解析 GitHub API 返回的 JSON
          UPSTREAM_SHA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$UPSTREAM_REPO/commits/$UPSTREAM_BRANCH" | \
            jq -r '.sha // empty')
          
          if [ -z "$UPSTREAM_SHA" ]; then
            echo "⚠️ Failed to fetch upstream SHA, will proceed with conversion"
            echo "needs_update=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "📌 Upstream SHA: $UPSTREAM_SHA"
          
          # 检查本地记录的上游 SHA
          if [ -f ".upstream_sha" ]; then
            LOCAL_SHA=$(cat .upstream_sha)
            echo "📌 Local SHA: $LOCAL_SHA"
            
            if [ "$UPSTREAM_SHA" = "$LOCAL_SHA" ]; then
              echo "✅ No updates from upstream, skipping conversion"
              echo "needs_update=false" >> $GITHUB_OUTPUT
            else
              echo "🔄 Upstream has updates, will convert"
              echo "needs_update=true" >> $GITHUB_OUTPUT
              echo "$UPSTREAM_SHA" > .upstream_sha
            fi
          else
            echo "🆕 First run, will convert"
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "$UPSTREAM_SHA" > .upstream_sha
          fi

      # 3️⃣ 设置 Python 环境（仅在需要时）
      - name: Setup Python
        if: steps.check_upstream.outputs.needs_update == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # 4️⃣ 下载上游规则文件（使用 sparse-checkout 优化）
      - name: Download upstream rules
        if: steps.check_upstream.outputs.needs_update == 'true'
        run: |
          echo "📥 Downloading rules from $UPSTREAM_REPO (sparse checkout)..."
          
          mkdir -p upstream_temp
          cd upstream_temp
          
          # 使用 sparse-checkout 只克隆 rule 目录
          git init
          git remote add origin "https://github.com/$UPSTREAM_REPO.git"
          git config core.sparseCheckout true
          
          # 只检出 rule 目录
          echo "rule/*" >> .git/info/sparse-checkout
          
          echo "⬇️ Pulling rule directory..."
          git pull --depth=1 origin "$UPSTREAM_BRANCH"
          
          cd ..
          
          if [ -d "upstream_temp/rule" ]; then
            echo "✅ Rules downloaded successfully"
            echo ""
            echo "📊 Available rule files:"
            file_count=$(find upstream_temp/rule -type f \( -name "*.yaml" -o -name "*.list" \) | wc -l)
            echo "   Total: $file_count files"
            find upstream_temp/rule -type f \( -name "*.yaml" -o -name "*.list" \) | head -n 10
            [ $file_count -gt 10 ] && echo "   ..."
          else
            echo "❌ Failed to download rules"
            exit 1
          fi

      # 5️⃣ 执行规则转换脚本（并行处理）
      - name: Convert all rules to DOMAIN fake_ip_filter
        if: steps.check_upstream.outputs.needs_update == 'true'
        run: |
          python <<'PYCODE'
          import os, re, glob, shutil
          from concurrent.futures import ThreadPoolExecutor, as_completed

          def convert_line(line: str):
              """将 Clash classical / list 规则行转换为 domain 模式"""
              line = line.strip()
              if not line or line.startswith("#"):
                  return None

              # 忽略非域名规则
              if any(x in line for x in [
                  "IP-CIDR", "SRC-IP-CIDR", "DST-PORT",
                  "SRC-PORT", "GEOIP", "PROCESS-NAME"
              ]):
                  return None

              line = line.lstrip("-").strip()

              if "," in line:
                  parts = line.split(",", 1)
                  rule = parts[0].strip()
                  value = parts[1].strip()
                  if rule == "DOMAIN-SUFFIX":
                      return f"+.{value}"
                  elif rule == "DOMAIN":
                      return value
                  elif rule == "DOMAIN-KEYWORD":
                      return f"*{value}*"
                  elif rule == "DOMAIN-WILDCARD":
                      return f"*.{value.lstrip('*.')}"
                  else:
                      return None

              if line.startswith("."):
                  return f"+{line}"
              if line.startswith("*."):
                  return line
              if re.match(r"^[\w\-]+(\.[a-zA-Z]{2,})+$", line):
                  return line

              return None

          def process_file(path):
              """处理单个文件"""
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      lines = f.readlines()
                  
                  converted = [convert_line(l) for l in lines]
                  converted = [x for x in converted if x]
                  
                  if not converted:
                      return None, 0
                  
                  output = "payload:\n" + "\n".join([f"  - '{x}'" for x in converted]) + "\n"
                  
                  rel_path = os.path.relpath(path, "upstream_temp/rule")
                  new_path = os.path.splitext(rel_path)[0] + "_fake_ip_filter.yaml"
                  new_path = os.path.join("rule_converted", new_path)
                  
                  os.makedirs(os.path.dirname(new_path), exist_ok=True)
                  with open(new_path, "w", encoding="utf-8") as f:
                      f.write(output)
                  
                  return os.path.basename(path), len(converted)
              except Exception as e:
                  print(f"❌ Error processing {path}: {e}")
                  return None, 0

          # 清理并重建输出目录
          output_dir = "rule_converted"
          if os.path.exists(output_dir):
              shutil.rmtree(output_dir)
          os.makedirs(output_dir, exist_ok=True)

          # 获取所有规则文件
          files = glob.glob("upstream_temp/rule/**/*.yaml", recursive=True) + \
                  glob.glob("upstream_temp/rule/**/*.list", recursive=True)
          
          print(f"🔄 Processing {len(files)} files in parallel...")
          
          total = 0
          total_domains = 0
          
          # 使用线程池并行处理（4个工作线程）
          with ThreadPoolExecutor(max_workers=4) as executor:
              futures = {executor.submit(process_file, path): path for path in files}
              
              for future in as_completed(futures):
                  filename, count = future.result()
                  if filename:
                      total += 1
                      total_domains += count
                      print(f"✅ 已转换: {filename} ({count} 条规则)")

          print(f"\n🎉 转换完成！")
          print(f"   📁 文件数: {total}")
          print(f"   📝 规则数: {total_domains}")
          
          with open("convert_stats.txt", "w") as f:
              f.write(f"{total} files, {total_domains} domains")
          PYCODE

      # 6️⃣ 清理临时文件
      - name: Clean up temporary files
        if: steps.check_upstream.outputs.needs_update == 'true'
        run: |
          rm -rf upstream_temp
          echo "🧹 Temporary files cleaned up"

      # 7️⃣ 提交并推送结果（仅在有更新时）
      - name: Commit and push converted results
        if: steps.check_upstream.outputs.needs_update == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 添加 .upstream_sha 和转换后的规则
          git add .upstream_sha rule_converted
          
          # 检查是否有变化
          if git diff --staged --quiet; then
            echo "📝 No changes detected, skipping commit"
          else
            stats=$(cat convert_stats.txt 2>/dev/null || echo "conversion complete")
            
            git commit -m "chore: sync upstream rules and convert to fake_ip_filter" \
                       -m "Stats: $stats" \
                       -m "Source: $UPSTREAM_REPO@$UPSTREAM_BRANCH" \
                       -m "Upstream SHA: $(cat .upstream_sha)" \
                       -m "Updated: $(date +'%Y-%m-%d %H:%M:%S UTC')"
            
            echo "🔄 Pulling latest changes from remote..."
            git pull --rebase origin "${TARGET_BRANCH}" || true
            
            echo "🚀 Pushing changes to ${TARGET_BRANCH}..."
            git push origin HEAD:"${TARGET_BRANCH}" || {
              echo "⚠️ Push failed, retrying with force-with-lease..."
              git push origin HEAD:"${TARGET_BRANCH}" --force-with-lease
            }
            
            echo "✅ Changes pushed successfully!"
          fi
