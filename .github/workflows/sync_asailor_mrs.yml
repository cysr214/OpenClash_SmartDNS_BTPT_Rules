name: Sync asailor YAML templates

on:
  schedule:
    # 每周二 UTC 时间 02:00 自动运行（北京时间 10:00）
    - cron: '0 2 * * 2'
  workflow_dispatch:
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  sync-templates:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ inputs.branch != '' && inputs.branch || github.ref_name }}
      TEMPLATE_BASE: "https://api.asailor.org/Custom_OpenClash_Rules/main/cfg/yaml"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Download YAML templates
        run: |
          set -euo pipefail

          templates=(
            "Custom_Clash.yaml"
            "Custom_Clash_DIY&Airport.yaml"
            "Custom_Clash_Full.yaml"
            "Custom_Clash_GFW.yaml"
            "Custom_Clash_Lite.yaml"
          )

          rm -rf yaml_templates_temp
          mkdir -p yaml_templates_temp

          for filename in "${templates[@]}"; do
            echo "📥 Downloading cfg/yaml/$filename"
            curl -fsSL \
              --retry 3 \
              --retry-delay 2 \
              --connect-timeout 15 \
              "$TEMPLATE_BASE/$filename" \
              -o "yaml_templates_temp/$filename"

            if [ ! -s "yaml_templates_temp/$filename" ]; then
              echo "❌ Empty YAML template: $filename"
              exit 1
            fi

            # 上游 GitHub 暂时不可用；将模板内本项目自身的资源地址
            # 改为公共后端临时托管地址，第三方资源地址保持不变。
            sed -i -E \
              's#https://(testingcf|gcore|cdn|fastly)\.jsdelivr\.net/gh/Aethersailor/Custom_OpenClash_Rules@main/#https://api.asailor.org/Custom_OpenClash_Rules/main/#g' \
              "yaml_templates_temp/$filename"
            sed -i \
              's#https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/main/#https://api.asailor.org/Custom_OpenClash_Rules/main/#g' \
              "yaml_templates_temp/$filename"

            if grep -Eq \
              'https://(testingcf|gcore|cdn|fastly)\.jsdelivr\.net/gh/Aethersailor/Custom_OpenClash_Rules@main/|https://raw\.githubusercontent\.com/Aethersailor/Custom_OpenClash_Rules/main/' \
              "yaml_templates_temp/$filename"; then
              echo "❌ Stale Aethersailor URL remains in: $filename"
              exit 1
            fi

            echo "✅ $filename ($(stat -c%s "yaml_templates_temp/$filename") bytes)"
          done

          # 所有模板下载成功后再统一更新；保留本仓库的自定义模板。
          mkdir -p cfg/yaml
          cp yaml_templates_temp/*.yaml cfg/yaml/
          rm -rf yaml_templates_temp

      - name: Commit and push synced files
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- cfg/yaml

          if git diff --cached --quiet; then
            echo "📝 YAML templates unchanged, skipping commit"
            exit 0
          fi

          git commit -m "chore: sync asailor YAML templates"
          git pull --rebase origin "$TARGET_BRANCH"
          git push origin "HEAD:$TARGET_BRANCH"
