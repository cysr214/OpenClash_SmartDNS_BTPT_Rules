name: Sync asailor MRS rules

on:
  schedule:
    # 每周二 UTC 时间 02:00 自动运行（北京时间 10:00）
    - cron: '0 2 * * 2'
  workflow_dispatch:
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  sync-mrs:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ inputs.branch != '' && inputs.branch || github.ref_name }}
      API_BASE: "https://api.asailor.org/Custom_OpenClash_Rules/main/rule"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Download MRS files
        run: |
          set -euo pipefail

          files=(
            "Custom_Direct_Domain.mrs"
            "Custom_Direct_IP.mrs"
            "Custom_Proxy_Domain.mrs"
            "Custom_Proxy_IP.mrs"
            "Steam_CDN_Domain.mrs"
            "Steam_CDN_IP.mrs"
          )

          rm -rf mrs_temp
          mkdir -p mrs_temp

          for filename in "${files[@]}"; do
            echo "📥 Downloading $filename"
            curl -fsSL \
              --retry 3 \
              --retry-delay 2 \
              --connect-timeout 15 \
              "$API_BASE/$filename" \
              -o "mrs_temp/$filename"

            if [ ! -s "mrs_temp/$filename" ]; then
              echo "❌ Empty MRS file: $filename"
              exit 1
            fi

            echo "✅ $filename ($(stat -c%s "mrs_temp/$filename") bytes)"
          done

          # 所有文件下载成功后再更新，保留其他工作流维护的 MRS。
          mkdir -p rule_converted_mrs
          rm -f rule_converted_mrs/*_fake_ip_filter.mrs
          cp mrs_temp/*.mrs rule_converted_mrs/
          rm -rf mrs_temp

          # 旧的 fake_ip_filter YAML 中间层不再使用。
          rm -rf rule_converted

      - name: Commit and push MRS files
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- rule_converted_mrs

          if git ls-files rule_converted | grep -q . || [ -d rule_converted ]; then
            git add -A -- rule_converted
          fi

          if git diff --cached --quiet; then
            echo "📝 MRS files unchanged, skipping commit"
            exit 0
          fi

          git commit -m "chore: sync MRS rules from api.asailor.org"
          git pull --rebase origin "$TARGET_BRANCH"
          git push origin "HEAD:$TARGET_BRANCH"
