name: Convert Clash Lists to SmartDNS

on:
  schedule:
    # 每周一 UTC 时间 02:20 自动运行（北京时间 10:20）
    - cron: '20 2 * * 1'
  workflow_dispatch:  # 支持手动触发
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
        default: ''

jobs:
  convert:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ inputs.branch != '' && inputs.branch || github.ref_name }}
      UPSTREAM_REPO: "Aethersailor/Custom_OpenClash_Rules"
      UPSTREAM_BRANCH: "main"
    steps:
      # 1️⃣ 检出仓库
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      # 2️⃣ 下载上游规则文件
      - name: Download upstream rules
        run: |
          echo "📥 Downloading rules from $UPSTREAM_REPO..."
          
          mkdir -p upstream_temp
          
          # 获取上游仓库的 rule 目录内容
          wget -q -O upstream_temp/repo.zip "https://github.com/$UPSTREAM_REPO/archive/refs/heads/$UPSTREAM_BRANCH.zip"
          
          if [ $? -eq 0 ] && [ -f upstream_temp/repo.zip ]; then
            echo "✅ Repository archive downloaded"
            
            # 解压并提取 rule 目录
            unzip -q upstream_temp/repo.zip -d upstream_temp/
            
            # 查找并移动 rule 目录（处理解压后的目录名称）
            EXTRACTED_DIR=$(find upstream_temp -maxdepth 1 -type d -name "*$UPSTREAM_BRANCH" | head -n1)
            if [ -d "$EXTRACTED_DIR/rule" ]; then
              mv "$EXTRACTED_DIR/rule" upstream_temp/rule
              echo "✅ Rules extracted successfully"
              
              echo ""
              echo "📊 Available .list files:"
              find upstream_temp/rule -type f -name "*.list" | head -n 10
            else
              echo "❌ Failed to find rule directory"
              exit 1
            fi
          else
            echo "❌ Failed to download repository archive"
            exit 1
          fi

      # 3️⃣ 转换为 SmartDNS 格式
      - name: Convert Clash list files to SmartDNS format
        shell: bash
        run: |
          mkdir -p rule_converted_smartdns
          changed=false
          summary=""
          
          # 从上游临时目录读取 .list 文件（使用 find 避免 globstar 问题）
          while IFS= read -r -d '' file; do
            [ -f "$file" ] || continue
            base_name=$(basename "${file%.list}")
            output="rule_converted_smartdns/${base_name}_smartdns.txt"
            echo "::group::Converting $file → $output"
            
            # 初始化计数器
            suf=0; key=0; dom=0; full=0; reg=0; cidr=0; skip=0
            awk '
              BEGIN { IGNORECASE=1 }
              # full: 精确匹配
              /^full:/ {
                sub(/^full:/, "");
                print $0;
                full++;
                next
              }
              # DOMAIN-SUFFIX
              /^DOMAIN-SUFFIX/ {
                split($0,a,",");
                print a[2];
                suf++;
                next
              }
              # DOMAIN-KEYWORD
              /^DOMAIN-KEYWORD/ {
                split($0,a,",");
                print "*-"a[2]".*";
                key++;
                next
              }
              # DOMAIN（精确）
              /^DOMAIN,/ {
                split($0,a,",");
                print "-."a[2];
                dom++;
                next
              }
              # regexp: → 注释保留
              /^regexp:/ {
                sub(/^regexp:/,"");
                print "# regexp:"$0;
                reg++;
                next
              }
              # IP-CIDR → 注释保留
              /^IP-CIDR/ {
                print "# skipped (CIDR): "$0;
                cidr++;
                next
              }
              # 注释或空行
              /^[[:space:]]*#/ || /^[[:space:]]*$/ {
                print $0;
                next
              }
              # 其他未知
              { print "# skipped: "$0; skip++; next }
              END {
                printf("# Stats: SUF=%d KEY=%d DOM=%d FULL=%d REG=%d CIDR=%d SKIP=%d\n", suf,key,dom,full,reg,cidr,skip) > "/dev/stderr"
              }
            ' "$file" | sort -u > "$output" 2> >(tee /tmp/stats.txt >&2)
            echo "Generated $output (preview):"
            head -n 10 "$output" || true
            echo "::endgroup::"
            if [ -s "$output" ]; then
              changed=true
              stats=$(tail -n1 /tmp/stats.txt | tr -d '#')
              summary+="${base_name}(${stats}) "
            fi
          done < <(find upstream_temp/rule -type f -name "*.list" -print0)
          
          if [ "$changed" = false ]; then
            echo "⚠️ No valid .list files found to convert."
            exit 0
          fi
          
          echo "✅ Summary: $summary"
          echo "$summary" > summary.log

      # 4️⃣ 清理临时文件
      - name: Clean up temporary files
        run: |
          rm -rf upstream_temp
          echo "🧹 Temporary files cleaned up"

      # 5️⃣ 提交并推送结果
      - name: Commit and push SmartDNS lists
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 添加所有转换后的文件
          git add rule_converted_smartdns
          
          # 检查是否有变化
          if git diff --staged --quiet; then
            echo "📝 No changes detected, skipping commit"
          else
            summary=$(cat summary.log)
            git commit -m "Auto convert upstream Clash → SmartDNS (Pro Enhanced) [$summary]"
            
            echo "🔄 Pulling latest changes from remote before push..."
            git pull --rebase origin "${TARGET_BRANCH}" || true
            
            echo "🚀 Pushing changes to ${TARGET_BRANCH}..."
            git push origin HEAD:"${TARGET_BRANCH}" || {
              echo "❌ Push failed after rebase attempt, retrying with force-with-lease..."
              git push origin HEAD:"${TARGET_BRANCH}" --force-with-lease
            }
            
            echo "✅ Changes pushed successfully!"
          fi
