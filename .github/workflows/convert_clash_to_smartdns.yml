name: Convert API YAML rules to SmartDNS

on:
  schedule:
    # 每周四 UTC 时间 02:20 自动运行（北京时间 10:20）
    - cron: '20 2 * * 4'
  workflow_dispatch:
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ inputs.branch != '' && inputs.branch || github.ref_name }}
      API_BASE: "https://api.asailor.org/Custom_OpenClash_Rules/main/rule"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Download domain YAML files
        run: |
          set -euo pipefail

          files=(
            "Custom_Direct_Domain.yaml"
            "Custom_Proxy_Domain.yaml"
            "Steam_CDN_Domain.yaml"
          )

          rm -rf yaml_temp
          mkdir -p yaml_temp

          for filename in "${files[@]}"; do
            echo "📥 Downloading $filename"
            curl -fsSL \
              --retry 3 \
              --retry-delay 2 \
              --connect-timeout 15 \
              "$API_BASE/$filename" \
              -o "yaml_temp/$filename"

            if ! grep -q '^payload:' "yaml_temp/$filename"; then
              echo "❌ Invalid rule YAML: $filename"
              exit 1
            fi

            echo "✅ $filename"
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate SmartDNS files
        run: |
          python <<'PYCODE'
          from pathlib import Path

          source_dir = Path("yaml_temp")
          output_dir = Path("rule_converted_smartdns")
          output_dir.mkdir(parents=True, exist_ok=True)

          expected_outputs = set()

          for source in sorted(source_dir.glob("*_Domain.yaml")):
              output_name = source.name.replace("_Domain.yaml", "_smartdns.txt")
              output = output_dir / output_name
              expected_outputs.add(output_name)

              rules = set()
              in_payload = False

              for raw_line in source.read_text(encoding="utf-8").splitlines():
                  line = raw_line.strip()

                  if line == "payload:":
                      in_payload = True
                      continue

                  if not in_payload or not line.startswith("- "):
                      continue

                  value = line[2:].strip()
                  if len(value) >= 2 and value[0] == value[-1] and value[0] in "'\"":
                      value = value[1:-1]

                  if not value:
                      continue

                  if value.startswith("+."):
                      converted = value[2:]
                  elif value.startswith("*."):
                      converted = value
                  elif value.startswith("*") and value.endswith("*"):
                      keyword = value.strip("*")
                      converted = f"*-{keyword}.*"
                  else:
                      converted = f"-.{value}"

                  rules.add(converted)

              content = [
                  f"# Generated from {source.name}",
                  "# Source: api.asailor.org",
                  f"# Total: {len(rules)}",
                  "",
                  *sorted(rules),
                  "",
              ]
              output.write_text("\n".join(content), encoding="utf-8")
              print(f"✅ {output}: {len(rules)} rules")

          # 删除旧结构遗留的 SmartDNS 文件，仅保留本次 API YAML 生成结果。
          for old_file in output_dir.glob("*_smartdns.txt"):
              if old_file.name not in expected_outputs:
                  old_file.unlink()
                  print(f"🗑️ Removed legacy file: {old_file}")
          PYCODE

          rm -rf yaml_temp

      - name: Commit and push SmartDNS files
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A rule_converted_smartdns

          if git diff --cached --quiet; then
            echo "📝 SmartDNS files unchanged, skipping commit"
            exit 0
          fi

          git commit -m "chore: convert API YAML rules to SmartDNS"
          git pull --rebase origin "$TARGET_BRANCH"
          git push origin "HEAD:$TARGET_BRANCH"
