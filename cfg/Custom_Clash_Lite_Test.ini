;设置分组标志位

;使用带 MRS rule-providers 的 Clash 基础模板（直连 CDN）
clash_rule_base=https://testingcf.jsdelivr.net/gh/levi882/OpenClash_SmartDNS_BTPT_Rules@main/cfg/yaml/Custom_Clash_Lite_Test_Base.yaml

;下方参数请勿修改
enable_rule_generator=true
overwrite_original_rules=true
