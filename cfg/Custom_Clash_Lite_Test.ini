;Custom_OpenClash_Rules
;轻量版 MRS 规则集测试模板
;基于 cfg/Custom_Clash_Lite.ini
;项目地址：https://github.com/levi882/OpenClash_SmartDNS_BTPT_Rules
;
;说明：
;1. subconverter 不能直接解析 MRS，因此这里只手动追加 RULE-SET 引用。
;2. MRS provider 定义位于 cfg/yaml/Custom_Clash_Lite_Test_Base.yaml。
;3. 本文件与配套 Base 文件必须一同发布，否则生成配置会缺少 rule-providers。

[custom]
;设置规则标志位
;以下规则按照从上往下的顺序遍历，优先命中上位规则

;本地地址和域名直连
ruleset=🎯 全球直连,[]RULE-SET,GeoSite_Private
ruleset=🎯 全球直连,[]RULE-SET,GeoIP_Private,no-resolve
;本项目收录的直连规则（MRS）
ruleset=🎯 全球直连,[]RULE-SET,Custom_Direct_Domain
ruleset=🎯 全球直连,[]RULE-SET,Custom_Direct_IP
;本项目收录的代理规则（MRS）
ruleset=🚀 手动选择,[]RULE-SET,Custom_Proxy_Domain
ruleset=🚀 手动选择,[]RULE-SET,Custom_Proxy_IP
;谷歌在国内可用的域名直连
ruleset=🎯 全球直连,[]RULE-SET,GeoSite_Google_CN
;国内游戏域名直连
ruleset=🎯 全球直连,[]RULE-SET,GeoSite_Category_Games_CN
;Steam 下载 CDN 直连（MRS）
ruleset=🎯 全球直连,[]RULE-SET,Steam_CDN_Domain
ruleset=🎯 全球直连,[]RULE-SET,Steam_CDN_IP
;各大游戏平台下载域名直连
ruleset=🎯 全球直连,[]RULE-SET,GeoSite_Category_Game_Platforms_Download
;BT Tracker 相关域名直连
ruleset=🎯 全球直连,[]RULE-SET,GeoSite_Category_Public_Tracker
ruleset=🚀 GitHub,[]RULE-SET,GeoSite_GitHub
ruleset=🚀 测速工具,[]RULE-SET,GeoSite_Category_Speedtest
ruleset=🍎 苹果服务,[]RULE-SET,GeoSite_Apple
ruleset=🎮 Steam,[]RULE-SET,GeoSite_Steam
ruleset=Ⓜ️ 微软服务,[]RULE-SET,GeoSite_Microsoft
ruleset=📢 谷歌FCM,[]RULE-SET,GeoSite_GoogleFCM
ruleset=🇬 谷歌服务,[]RULE-SET,GeoSite_Google
ruleset=🚀 手动选择,[]RULE-SET,GeoSite_GFW
ruleset=🎮 游戏平台,[]RULE-SET,GeoSite_Category_Games
ruleset=🇬 谷歌服务,[]RULE-SET,GeoIP_Google,no-resolve
;保留 GeoSite_CN MRS 作为国内域名兜底
ruleset=🎯 全球直连,[]RULE-SET,GeoSite_CN
;保留 GeoIP_CN MRS 作为国内 IP 兜底
ruleset=🎯 全球直连,[]RULE-SET,GeoIP_CN,no-resolve
;以上兜底规则会根据实际情况随时取消
;PT/BT 优化开启会使 80/443 以外端口的流量直连
;MRS 不支持 classical，端口规则改为内联规则
ruleset=🔀 非标端口,[]DST-PORT,1-79
ruleset=🔀 非标端口,[]DST-PORT,81-442
ruleset=🔀 非标端口,[]DST-PORT,444-65535
;国内冷门域名会命中漏网之鱼，如影响使用，请设置漏网之鱼直连
;漏网之鱼直连时，无法通过 DNS 泄露测试，但是并不存在泄露
ruleset=🐟 漏网之鱼,[]FINAL
;设置规则标志位结束

;设置节点分组标志位
