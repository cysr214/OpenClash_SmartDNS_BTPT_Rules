# Custom_Clash_Lite_Test.ini 的配套基础模板
# subconverter 负责写入 proxies、proxy-groups 和 rules；
# 本文件只预置 Mihomo MRS rule-providers。

proxies: []
proxy-groups: []
rules: []

rule-providers:
