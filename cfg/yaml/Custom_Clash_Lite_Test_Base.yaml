    type: http
    behavior: domain
    format: mrs
    path: ./rule_provider/GeoSite_Private.mrs
    url: https://cdn.jsdelivr.net/gh/levi882/v2ray-rules-dat@release/mrs/geosite/private.mrs
    interval: 86400

  GeoIP_Private:
    type: http
    behavior: ipcidr
    format: mrs
    path: ./rule_provider/GeoIP_Private.mrs
